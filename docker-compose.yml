services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gold
      POSTGRES_USER: gold
      POSTGRES_PASSWORD: gold
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gold -d gold"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gold-agent:
    build:
      context: ./gold-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Legacy Go backend — not started by default.
  # To run: docker compose --profile legacy up backend
  backend:
    profiles: ["legacy"]
    build:
      context: ./gold-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      GOLD_HTTP_PORT: "8080"
      GOLD_DATABASE_URL: postgres://gold:gold@postgres:5432/gold?sslmode=disable
      GOLD_REDIS_URL: redis://redis:6379/0
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_WEBSOCKET_STREAM_URL: ${BINANCE_WEBSOCKET_STREAM_URL:-wss://stream.binance.com:9443}
      BINANCE_WEBSOCKET_API_URL: ${BINANCE_WEBSOCKET_API_URL:-wss://ws-api.binance.com:443/ws-api/v3}
      POLYMARKET_API_KEY: ${POLYMARKET_API_KEY:-}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-}
      POLYMARKET_API_PASSPHRASE: ${POLYMARKET_API_PASSPHRASE:-}
      GOLD_SYMBOLS: ${GOLD_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT}
      GOLD_DEFAULT_INTERVAL: ${GOLD_DEFAULT_INTERVAL:-5m}
      GOLD_DRY_RUN: ${GOLD_DRY_RUN:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CRYPTOPANIC_API_KEY: ${CRYPTOPANIC_API_KEY:-}

  dashboard:
    build:
      context: ./gold-dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws/v1/stream

volumes:
  postgres_data:
